<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>YAKA Guest Assistant</title>

  <!-- Favicons -->
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <meta name="theme-color" content="#161616">

  <style>
    :root{
      --yaka-red: #7a1315;
      --yaka-grey: #cececd;
      --yaka-dark: #161616;

      --card: rgba(22,22,22,0.78);
      --card-border: rgba(206,206,205,0.18);
      --text: var(--yaka-grey);
      --muted: rgba(206,206,205,0.75);
      --shadow: 0 18px 45px rgba(0,0,0,0.45);

      --input-bg: rgba(206,206,205,0.08);
      --input-border: rgba(206,206,205,0.22);

      --me-bg: rgba(206,206,205,0.10);
      --me-border: rgba(206,206,205,0.24);

      --bot-bg: rgba(122,19,21,0.12);
      --bot-border: rgba(122,19,21,0.35);
    }

    * { box-sizing: border-box; }

    /* ✅ UPDATED: Background image + dark overlay + your gradients */
    body{
      margin:0;
      font-family: Arial, sans-serif;
      color: var(--text);
      min-height: 100vh;

      /* IMPORTANT: change this filename if you name it differently */
      background:
        linear-gradient(rgba(22,22,22,0.55), rgba(22,22,22,0.55)),
        url("/bg-yaka.png") center / cover no-repeat,
        radial-gradient(900px 520px at 10% 5%, rgba(122,19,21,0.35), transparent 55%),
        radial-gradient(900px 520px at 90% 15%, rgba(206,206,205,0.14), transparent 55%),
        radial-gradient(700px 420px at 50% 120%, rgba(122,19,21,0.22), transparent 60%);

      background-attachment: fixed;
      background-color: var(--yaka-dark);
    }

  .wrap{
  max-width: 920px;
  margin: 0 auto;
  padding: 18px 14px 22px;

  /* NEW */
  min-height: 100dvh;                 /* dynamic viewport height (better inside iframe) */
  display: flex;
}

    /* Slightly stronger glass so text stays readable on a colourful background */
    .card{
  border-radius: 22px;
  overflow: hidden;
  border: 1px solid var(--card-border);
  background: linear-gradient(180deg, rgba(22,22,22,0.86), rgba(22,22,22,0.72));
  box-shadow: var(--shadow);
  backdrop-filter: blur(10px);

  /* NEW */
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;                      /* critical for nested flex scrolling */
}

    .header{
      padding: 22px 18px 14px;
      text-align: center;
      position: relative;
    }

    .header::after{
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(900px 250px at 50% 0%, rgba(122,19,21,0.55), transparent 60%),
        radial-gradient(900px 250px at 50% 60%, rgba(206,206,205,0.10), transparent 60%);
      opacity: 0.9;
    }

    .brand{
      position: relative;
      z-index: 1;
      display: grid;
      place-items: center;
      gap: 10px;
    }

    .brand img{
      height: 200px;
      width: auto;
      display: block;
      filter: drop-shadow(0 12px 22px rgba(0,0,0,0.55));
    }

    .brand .tag{
      margin-top: -6px;
      font-size: 14px;
      color: rgba(206,206,205,0.82);
      letter-spacing: 0.8px;
      text-transform: uppercase;
    }

    /* language row */
    .lang-row{
      position: relative;
      z-index: 2;
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .lang-row label{
      font-size: 12px;
      color: rgba(206,206,205,0.80);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* FIX: dropdown visibility for non-selected options */
    .lang-row select{
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(206,206,205,0.22);
      background: rgba(0,0,0,0.18);
      color: var(--yaka-grey);
      outline: none;
      min-width: 260px;

      -webkit-appearance: none;
      -moz-appearance: none;
      appearance: none;

      color-scheme: dark;
    }

    .lang-row select option{
      background: #f2f2f2;
      color: #111111;
    }

    .lang-row select:focus{
      border-color: rgba(122,19,21,0.70);
      box-shadow: 0 0 0 3px rgba(122,19,21,0.25);
    }

    .sub{
      padding: 12px 18px;
      font-size: 13px;
      color: var(--muted);
      border-top: 1px solid rgba(206,206,205,0.10);
      border-bottom: 1px solid rgba(206,206,205,0.10);
      background: rgba(0,0,0,0.08);
    }

    .status{
      padding: 10px 18px;
      font-size: 12px;
      color: var(--muted);
      border-bottom: 1px solid rgba(206,206,205,0.10);
      background: rgba(0,0,0,0.10);
    }

    .pill{
      display: inline-block;
      padding: 5px 10px;
      border-radius: 999px;
      margin-right: 8px;
      border: 1px solid rgba(206,206,205,0.22);
      background: rgba(206,206,205,0.08);
      color: rgba(206,206,205,0.92);
    }

   .chat{
  padding: 16px 18px;
  display: flex;
  flex-direction: column;
  gap: 12px;

  /* OLD: max-height: 60vh; overflow-y: auto; */
  /* NEW */
  flex: 1;                            /* fill remaining space */
  min-height: 0;                      /* allow proper scroll area */
  overflow-y: auto;

  background:
    radial-gradient(1000px 520px at 25% 0%, rgba(122,19,21,0.16), transparent 60%),
    radial-gradient(900px 520px at 90% 10%, rgba(206,206,205,0.08), transparent 55%),
    rgba(0,0,0,0.06);
}

    .bubble{
      padding: 12px 14px;
      border-radius: 16px;
      max-width: 92%;
      line-height: 1.45;
      white-space: pre-wrap;
      word-wrap: break-word;
      border: 1px solid rgba(206,206,205,0.10);
      box-shadow: 0 10px 25px rgba(0,0,0,0.20);
    }

    .me{
      align-self: flex-end;
      background: var(--me-bg);
      border-color: var(--me-border);
    }

    .bot{
      align-self: flex-start;
      background: var(--bot-bg);
      border-color: var(--bot-border);
    }

    .bubble a{
      color: var(--yaka-grey);
      text-decoration: underline;
      text-underline-offset: 3px;
      word-break: break-word;
    }

    .meta{
      font-size: 11px;
      color: rgba(206,206,205,0.68);
      margin-top: 8px;
    }

    .input-area{
      padding: 14px 18px;
      border-top: 1px solid rgba(206,206,205,0.10);
      background: rgba(0,0,0,0.10);
    }

    .row{
  display:flex;
  gap: 8px;
  align-items: center;

  /* NEW (critical) */
  min-width: 0;
}

   #msg{
  flex: 1;
  padding: 12px 12px;
  border-radius: 12px;
  border: 1px solid rgba(206,206,205,0.22);
  font-size: 16px;
  outline: none;
  background: rgba(206,206,205,0.08);
  color: var(--yaka-grey);

  /* NEW (critical) */
  min-width: 0;
}

    #msg::placeholder{
      color: rgba(206,206,205,0.55);
    }

    #msg:focus{
      border-color: rgba(122,19,21,0.70);
      box-shadow: 0 0 0 3px rgba(122,19,21,0.25);
    }

    button{
      padding: 12px 14px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-size: 15px;
      line-height: 1;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      transition: transform .06s ease, opacity .15s ease, box-shadow .15s ease;
 flex: 0 0 auto;   /* NEW */
    }

    button:active{ transform: translateY(1px); }

    .btn{
      background: var(--yaka-red);
      color: var(--yaka-grey);
      box-shadow: 0 10px 20px rgba(122,19,21,0.25);
      border: 1px solid rgba(206,206,205,0.14);
    }

    .btn.secondary{
      background: rgba(206,206,205,0.08);
      color: var(--yaka-grey);
      border: 1px solid rgba(206,206,205,0.22);
      box-shadow: none;
    }

    .btn:hover{ opacity: 0.92; }

    .btn:disabled{
      opacity: 0.6;
      cursor: not-allowed;
    }

    .hint{
      font-size: 12px;
      margin-top: 8px;
      color: rgba(206,206,205,0.70);
    }

    .small-btn{
      padding: 10px 12px;
      font-size: 14px;
      margin-right: 8px;
    }

    /* Optional: on mobile, fixed background can feel jumpy */
    @media (max-width: 768px) {
      body { background-attachment: scroll; }
    }
.input-area{
  padding-bottom: calc(14px + env(safe-area-inset-bottom, 0px));
}
  </style>
</head>

  <div class="wrap">
    <div class="card">

      <div class="header">
        <div class="brand">
          <img src="/logo.png" alt="YAKA Residences Logo" />
          <div class="tag" id="tagText">Virtual Guest Assistant</div>

          <div class="lang-row">
            <label>
              <span id="langLabel">Language</span>
              <select id="langSelect" aria-label="Select language">
                <option value="en">English</option>
                <option value="si">සිංහල (Sinhala)</option>
                <option value="ta">தமிழ் (Tamil)</option>

                <option value="es">Español (Spanish)</option>
                <option value="ru">Русский (Russian)</option>
                <option value="it">Italiano (Italian)</option>
                <option value="zh">中文 (Mandarin Chinese)</option>
                <option value="de">Deutsch (German)</option>
                <option value="pl">Polski (Polish)</option>
                <option value="fr">Français (French)</option>
                <option value="hi">हिन्दी (Hindi)</option>
                <option value="pt">Português (Portuguese)</option>
                <option value="ar">العربية (Arabic)</option>
              </select>
            </label>
          </div>
        </div>
      </div>

      <div class="sub" id="subText">
        Ask questions about Wi-Fi, check-in/out, house rules, and nearby places.
      </div>

      <div class="status">
        <span class="pill" id="aptPill">Apartment: (not set)</span>
        <span class="pill" id="apiPill">API: checking…</span>
        <span class="pill" id="micPill">Mic: ready</span>
      </div>

      <div class="chat" id="chat"></div>

      <div class="input-area">
        <div class="row">
          <input id="msg" placeholder="Type or speak your question…" autocomplete="off" />
          <button class="btn secondary" id="micBtn" type="button" title="Voice question" aria-label="Voice question">🎙️</button>
          <button class="btn" id="sendBtn" type="button">Send</button>
        </div>
        <div class="hint" id="hintText">
          Tip: Tap 🎙️ to record, tap again to stop &amp; send. The bot can reply in your language and you can play replies aloud.
        </div>
      </div>

    </div>
  </div>

  function guessBrowserLang() {
    const b = (navigator.language || 'en').toLowerCase();
    if (b.startsWith('si')) return 'si';
    if (b.startsWith('ta')) return 'ta';
    if (b.startsWith('es')) return 'es';
    if (b.startsWith('ru')) return 'ru';
    if (b.startsWith('it')) return 'it';
    if (b.startsWith('zh')) return 'zh';
    if (b.startsWith('de')) return 'de';
    if (b.startsWith('pl')) return 'pl';
    if (b.startsWith('fr')) return 'fr';
    if (b.startsWith('hi')) return 'hi';
    if (b.startsWith('pt')) return 'pt';
    if (b.startsWith('ar')) return 'ar';
    return 'en';
  }

  function getUiLang() {
    const saved = localStorage.getItem('yaka_ui_lang');
    if (saved && I18N[saved]) return saved;
    return guessBrowserLang();
  }

  let uiLang = getUiLang();
  langSelect.value = uiLang;

  function t(key) {
    return (I18N[uiLang] && I18N[uiLang][key]) ? I18N[uiLang][key] : (I18N.en[key] || key);
  }

  function applyLanguageToUi() {
    document.documentElement.lang = uiLang;
    document.documentElement.dir = (uiLang === 'ar') ? 'rtl' : 'ltr';

    langLabel.textContent = t('langLabel');
    tagText.textContent = t('tag');
    subText.textContent = t('sub');
    msgEl.placeholder = t('placeholder');
    sendBtn.textContent = t('send');
    hintText.textContent = t('tip');

    aptPill.textContent = apt ? `${t('aptPrefix')}: ${apt}` : `${t('aptPrefix')}: (not set)`;
  }

  langSelect.addEventListener('change', () => {
    uiLang = langSelect.value;
    localStorage.setItem('yaka_ui_lang', uiLang);
    applyLanguageToUi();
    addBubble(t('langUpdated'), 'bot', '', { speak: true });
  });

  const ttsCache = new Map();
  let currentTtsAudio = null;
  let currentTtsAbort = null;

  function stopTtsPlayback() {
    if (currentTtsAudio) {
      try { currentTtsAudio.pause(); } catch {}
      try { currentTtsAudio.currentTime = 0; } catch {}
      currentTtsAudio = null;
    }
    if (currentTtsAbort) {
      try { currentTtsAbort.abort(); } catch {}
      currentTtsAbort = null;
    }
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, m => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[m]));
  }

  function linkify(text) {
    const safe = escapeHtml(text);
    const withLinks = safe.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>');
    return withLinks.replace(/\n/g, '<br>');
  }

  function setMicStatus(textKey) { micPill.textContent = t(textKey); }
  function setApiStatus(textKey) { apiPill.textContent = t(textKey); }

  function addBubble(text, who = 'bot', meta = '', options = {}) {
    const div = document.createElement('div');
    div.className = `bubble ${who}`;

    const content = document.createElement('div');
    if (who === 'bot') content.innerHTML = linkify(text);
    else content.textContent = text;

    div.appendChild(content);

    if (who === 'bot' && options.speak === true) {
      const row = document.createElement('div');
      row.style.marginTop = '10px';

      const speakBtn = document.createElement('button');
      speakBtn.className = 'btn secondary small-btn';
      speakBtn.type = 'button';
      speakBtn.textContent = t('speak');

      const stopBtn = document.createElement('button');
      stopBtn.className = 'btn secondary small-btn';
      stopBtn.type = 'button';
      stopBtn.textContent = t('stop');
      stopBtn.onclick = () => stopTtsPlayback();

      speakBtn.onclick = async () => {
        const oldLabel = speakBtn.textContent;
        stopTtsPlayback();

        speakBtn.disabled = true;
        speakBtn.textContent = t('generating');

        try {
          if (ttsCache.has(text)) {
            currentTtsAudio = new Audio(ttsCache.get(text));
            currentTtsAudio.onended = () => { currentTtsAudio = null; };
            await currentTtsAudio.play();
            return;
          }

          currentTtsAbort = new AbortController();
          const r = await fetch('/api/tts', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            signal: currentTtsAbort.signal,
            body: JSON.stringify({ text })
          });

          if (!r.ok) throw new Error(await r.text());

          const blob = await r.blob();
          const url = URL.createObjectURL(blob);
          ttsCache.set(text, url);

          currentTtsAudio = new Audio(url);
          currentTtsAudio.onended = () => { currentTtsAudio = null; };
          await currentTtsAudio.play();
        } catch (e) {
          if (e?.name !== 'AbortError') alert(t('ttsFail') + " " + (e.message || e));
        } finally {
          currentTtsAbort = null;
          speakBtn.disabled = false;
          speakBtn.textContent = oldLabel;
        }
      };

      row.appendChild(speakBtn);
      row.appendChild(stopBtn);
      div.appendChild(row);
    }

    if (meta) {
      const m = document.createElement('div');
      m.className = 'meta';
      m.textContent = meta;
      div.appendChild(m);
    }

    chatEl.appendChild(div);
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  async function pingApi() {
    try {
      const res = await fetch('/', { method: 'GET' });
      setApiStatus(res.ok ? 'apiOk' : 'apiNotReady');
    } catch (e) {
      setApiStatus('apiOffline');
    }
  }

  async function sendMessage(text) {
    const message = (text ?? msgEl.value).trim();
    if (!message) return;

    if (!apt) {
      addBubble(t('missingAptLong'), 'bot', '', { speak: true });
      return;
    }

    if (!text) msgEl.value = '';
    addBubble(message, 'me');

    sendBtn.disabled = true;
    micBtn.disabled = true;

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ apt, message })
      });

      if (!res.ok) {
        const tt = await res.text();
        addBubble('Sorry — something went wrong contacting the server.', 'bot', `HTTP ${res.status}: ${tt.slice(0, 160)}`, { speak: true });
        return;
      }

      const data = await res.json();
      const reply = data.reply || 'No reply returned.';
      const meta = [
        data.source ? `source=${data.source}` : null,
        (typeof data.score === 'number') ? `score=${data.score.toFixed(2)}` : null,
        data.detected_language ? `lang=${data.detected_language}` : null
      ].filter(Boolean).join(' • ');

      addBubble(reply, 'bot', meta, { speak: true });
    } catch (e) {
      addBubble('Sorry — could not reach the server. Is it running?', 'bot', e.message || String(e), { speak: true });
    } finally {
      sendBtn.disabled = false;
      micBtn.disabled = false;
      msgEl.focus();
    }
  }

  sendBtn.addEventListener('click', () => sendMessage());
  msgEl.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendMessage(); });

  let mediaRecorder = null;
  let chunks = [];
  let isRecording = false;
  let activeMimeType = '';

  function getBestRecorderMimeType() {
    const candidates = ['audio/webm;codecs=opus','audio/webm','audio/mp4','audio/mpeg'];
    if (!window.MediaRecorder || !MediaRecorder.isTypeSupported) return '';
    for (const t0 of candidates) { try { if (MediaRecorder.isTypeSupported(t0)) return t0; } catch {} }
    return '';
  }

  function extensionForMime(mime) {
    const m = (mime || '').toLowerCase();
    if (m.includes('mp4')) return 'mp4';
    if (m.includes('mpeg')) return 'mp3';
    return 'webm';
  }

  async function startRecording() {
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      setMicStatus('micUnsupported'); addBubble(t('recNotSupported'), 'bot', '', { speak: true }); return;
    }
    if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
      setMicStatus('micNeedsHttps'); addBubble(t('httpsRequired'), 'bot', '', { speak: true }); return;
    }
    if (!window.MediaRecorder) {
      setMicStatus('micUnsupported'); addBubble(t('recNotSupported'), 'bot', '', { speak: true }); return;
    }

    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    chunks = [];

    activeMimeType = getBestRecorderMimeType();
    try {
      mediaRecorder = activeMimeType ? new MediaRecorder(stream, { mimeType: activeMimeType }) : new MediaRecorder(stream);
    } catch (e) {
      mediaRecorder = new MediaRecorder(stream);
      activeMimeType = mediaRecorder.mimeType || '';
    }

    mediaRecorder.ondataavailable = (e) => { if (e.data && e.data.size > 0) chunks.push(e.data); };

    mediaRecorder.onstop = async () => {
      stream.getTracks().forEach(tk => tk.stop());
      setMicStatus('micTranscribing');

      try {
        const mime = mediaRecorder.mimeType || activeMimeType || 'audio/webm';
        const ext = extensionForMime(mime);
        const blob = new Blob(chunks, { type: mime });
        const fd = new FormData();
        fd.append('audio', blob, `audio.${ext}`);

        const r = await fetch('/api/stt', { method: 'POST', body: fd });
        if (!r.ok) throw new Error(await r.text() || `HTTP ${r.status}`);

        const data = await r.json();
        const text = (data.text || '').trim();

        if (!text) {
          addBubble("Sorry — I couldn't hear that. Please try again.", 'bot', '', { speak: true });
          setMicStatus('micReady');
          return;
        }

        setMicStatus('micReady');
        await sendMessage(text);
      } catch (e) {
        setMicStatus('micError');
        addBubble(t('sttFail'), 'bot', e.message || String(e), { speak: true });
        setMicStatus('micReady');
      }
    };

    mediaRecorder.start();
    setMicStatus('micRecording');
  }

  function stopRecording() { if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop(); }

  micBtn.addEventListener('click', async () => {
    try {
      if (!isRecording) { isRecording = true; micBtn.textContent = '⏹️'; await startRecording(); }
      else { isRecording = false; micBtn.textContent = '🎙️'; stopRecording(); }
    } catch (e) {
      isRecording = false; micBtn.textContent = '🎙️';
      setMicStatus('micError');
      addBubble('Could not start recording.', 'bot', e.message || String(e), { speak: true });
      setMicStatus('micReady');
    }
  });

  applyLanguageToUi();
  addBubble(t('greet'), 'bot', '', { speak: true });
  if (!apt) addBubble(t('missingApt'), 'bot', '', { speak: true });

  setMicStatus('micReady');
  setApiStatus('apiChecking');
  pingApi();
  msgEl.focus();
</script>

</body>
</html>
